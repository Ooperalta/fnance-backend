

services:
  db:
    image: postgres:15-alpine
    container_name: fnance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_Password}
      POSTGRES_DB: fnance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: